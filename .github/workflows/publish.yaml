name: publish

on:
    push:
        branches:
          - main

permissions:
    contents: write
    pages: write
    id-token: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v6

          - name: Install uv
            uses: astral-sh/setup-uv@v8.1.0
            with:
                version: "latest"

          - name: Set up Python
            uses: actions/setup-python@v6
            with:
                python-version-file: ".python-version"

          - name: Install dependencies with uv
            run: uv sync --no-dev

          - name: Build content folder
            run: uv run python leetpattern/core/main.py

          - name: Deploy to GitHub Pages
            run: uv run mkdocs gh-deploy --force
